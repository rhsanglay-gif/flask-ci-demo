# This file tells GitHub: "Every time someone pushes code, do these things."

name: CI Pipeline           # The name you'll see in the GitHub Actions tab

# WHEN should this run?
on:
  push:                     # Run when code is pushed...
    branches: [main]        # ...to the main branch
  pull_request:             # Also run on pull requests
    branches: [main]

# WHAT should it do?
jobs:
  check-code:
    name: Lint and Test
    runs-on: ubuntu-latest  # Use a Linux machine provided by GitHub

    steps:
      # Step 1: Download your code onto the runner
      - name: Get the code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install your packages (pip install)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          

      # # Step 4: Check code style
      # - name: Check code style (lint)
        # run: flake8 app/

      # Step 5: Run tests
      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python -m pytest tests/

  # This job runs AFTER "check-code" passes
  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: check-code
    if: github.event_name == 'push'  # Only build on push, not on PRs

    # Give this job permission to push images
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      # Log in to GitHub's container registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # Your GitHub username
          password: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided by GitHub

      # Build and push the image
      - name: Build and push
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }} 
          script: |

            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S docker pull ghcr.io/${{ github.repository }}:latest

            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S docker stop my-app || true

            # 1. Force remove the old container s
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S docker rm -f my-app || true
            
            # 2. Delete the old image to force a fresh download
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S docker rmi ghcr.io/${{ github.repository }}:latest || true
            
            # 3. Pull and start the brand new container
            echo "${{ secrets.SERVER_PASSWORD }}" | sudo -S docker run -d --name my-app -p 80:5000 ghcr.io/${{ github.repository }}:latest
            
            echo "Deployed successfully with sudo!"
